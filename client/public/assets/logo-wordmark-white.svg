<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none" role="img" aria-label="ShiftSync">
  <!-- Icon mark (white/transparent for dark backgrounds) -->
  <rect width="100" height="100" rx="22" fill="rgba(255,255,255,0.15)"/>
  <!-- Dashed ring -->
  <circle cx="50" cy="50" r="27" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <!-- Dot markers -->
  <circle cx="77" cy="50" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="23" cy="50" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Clock hands -->
  <line x1="50" y1="50" x2="37" y2="33" stroke="rgba(255,255,255,0.7)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="61" y2="40" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="1.8" fill="rgba(255,255,255,0.7)"/>
  <!-- White sync arrows (both white on dark background) -->
  <path d="M 29 29 A 30 30 0 0 1 78 37" stroke="white" stroke-width="5.2" stroke-linecap="round" fill="none"/>
  <polygon points="78,37 82,30 86,38" fill="white"/>
  <path d="M 71 71 A 30 30 0 0 1 22 63" stroke="rgba(255,255,255,0.85)" stroke-width="5.2" stroke-linecap="round" fill="none"/>
  <polygon points="22,63 18,70 14,62" fill="rgba(255,255,255,0.85)"/>

  <!-- ShiftSync wordmark text (white) -->
  <text x="116" y="42" font-family="'Sora', 'Inter', sans-serif" font-weight="700" font-size="30" fill="white" letter-spacing="-0.5">Shift</text>
  <text x="116" y="76" font-family="'Sora', 'Inter', sans-serif" font-weight="700" font-size="30" fill="rgba(255,255,255,0.7)" letter-spacing="-0.5">Sync</text>
</svg>
