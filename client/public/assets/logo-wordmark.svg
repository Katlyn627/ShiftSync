<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none" role="img" aria-label="ShiftSync">
  <defs>
    <linearGradient id="bg-wm" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6B5FED"/>
      <stop offset="55%"  stop-color="#5046E4"/>
      <stop offset="100%" stop-color="#3B82C4"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <rect width="100" height="100" rx="22" fill="url(#bg-wm)"/>
  <!-- Dashed ring -->
  <circle cx="50" cy="50" r="27" stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <!-- Dot markers -->
  <circle cx="77" cy="50" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="23" cy="50" r="1.5" fill="#22D3EE" fill-opacity="0.6"/>
  <!-- Clock hands -->
  <line x1="50" y1="50" x2="37" y2="33" stroke="rgba(255,255,255,0.55)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="61" y2="40" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="1.8" fill="rgba(255,255,255,0.5)"/>
  <!-- White sync arrow -->
  <path d="M 29 29 A 30 30 0 0 1 78 37" stroke="white" stroke-width="5.2" stroke-linecap="round" fill="none"/>
  <polygon points="78,37 82,30 86,38" fill="white"/>
  <!-- Cyan sync arrow -->
  <path d="M 71 71 A 30 30 0 0 1 22 63" stroke="#22D3EE" stroke-width="5.2" stroke-linecap="round" fill="none"/>
  <polygon points="22,63 18,70 14,62" fill="#22D3EE"/>

  <!-- ShiftSync wordmark text -->
  <text x="116" y="42" font-family="'Sora', 'Inter', sans-serif" font-weight="700" font-size="30" fill="#1E1B4B" letter-spacing="-0.5">Shift</text>
  <text x="116" y="76" font-family="'Sora', 'Inter', sans-serif" font-weight="700" font-size="30" fill="#5046E4" letter-spacing="-0.5">Sync</text>
</svg>
